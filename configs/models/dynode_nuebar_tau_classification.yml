#       configs/models/dynedge_nuebar_tau_classificatiion.yml
arguments:
  backbone:
    ModelConfig:
      arguments:
        add_global_variables_after_pooling: false
        dynedge_layer_sizes: null
        features_subset: null
        global_pooling_schemes: [min, max, mean, sum]
        nb_inputs: 4
        nb_neighbours: 8
        post_processing_layer_sizes: null
        readout_layer_sizes: null
      class_name: DynEdge
  graph_definition:
    ModelConfig:
      arguments:
        columns: [0, 1, 2]
        detector:
          ModelConfig:
            arguments: {}
            class_name: Prometheus
        dtype: torch.float32
        nb_nearest_neighbours: 8
        node_definition:
          ModelConfig:
            arguments: {}
            class_name: NodesAsPulses
        input_feature_names: [sensor_pos_x, sensor_pos_y, sensor_pos_z, t]
      class_name: KNNGraph
  optimizer_class: '!class torch.optim Adam'
  optimizer_kwargs: {eps: 0.001, lr: 0.001}
  scheduler_class: null
  scheduler_config: null
  scheduler_kwargs: null
  tasks:
    - ModelConfig:
        arguments:
          hidden_size: 128
          loss_function:
            ModelConfig:
              arguments: {}
              class_name: BinaryCrossEntropyLoss
          loss_weight: null
          prediction_labels: ['is_tau_pred']
          target_labels: is_tau
          transform_inference: null
          transform_prediction_and_target: null
          transform_support: null
          transform_target: null
        class_name: BinaryClassificationTask
class_name: StandardModel
